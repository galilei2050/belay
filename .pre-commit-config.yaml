repos:
  - repo: local
    hooks:
      - id: lint-fix
        name: make lint-fix
        entry: make lint-fix
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: pre-push
        name: make pre-push
        entry: make pre-push
        language: system
        pass_filenames: false
        stages: [pre-push]
