name: Monthly dependency upgrade

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: uv sync --group dev --upgrade
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: monthly dependency upgrade"
          branch: chore/uv-upgrade
          title: "Monthly dep upgrade"
          body: |
            Automated `uv sync --upgrade` run. Review the `uv.lock` diff, confirm CI is green, then merge.
